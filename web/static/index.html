<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>解碼音符 — Music Genre Predictor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ── Navigation ── -->
<nav class="site-nav" role="navigation" aria-label="主導覽">
  <div class="nav-inner">
    <a class="nav-logo" href="#" aria-label="解碼音符首頁">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="margin-right:8px">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
      <span class="nav-wordmark">解碼音符</span>
    </a>
    <div class="nav-divider" aria-hidden="true"></div>
    <span class="nav-sub">Music Genre Predictor</span>
  </div>
</nav>

<!-- ── Main ── -->
<main class="main-section" id="analyze-section">
  <div class="section-inner">
    <div class="main-layout">

    <!-- left: input card -->
    <div class="input-card">
      <h1 class="input-heading">立即分析</h1>

      <div class="tabs" role="tablist" aria-label="輸入方式">
        <button class="tab active" role="tab" aria-selected="true"  aria-controls="panel-url"  id="tab-url"  onclick="switchTab('url')">YouTube URL</button>
        <button class="tab"        role="tab" aria-selected="false" aria-controls="panel-file" id="tab-file" onclick="switchTab('file')">上傳檔案</button>
      </div>

      <div class="panel active" id="panel-url" role="tabpanel" aria-labelledby="tab-url">
        <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=…"
               aria-label="YouTube URL" autocomplete="off" spellcheck="false" />
      </div>

      <div class="panel" id="panel-file" role="tabpanel" aria-labelledby="tab-file">
        <label class="file-label" for="file-input">
          <svg class="file-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>選擇 .mp3 / .wav 檔案</span>
          <span id="file-name" class="file-name-display">尚未選擇</span>
        </label>
        <input type="file" id="file-input" accept=".mp3,.wav" style="display:none"
               aria-label="選擇音訊檔案"
               onchange="document.getElementById('file-name').textContent = this.files[0]?.name || '尚未選擇'" />
      </div>

      <div class="analyze-btn-wrap">
        <button class="btn-primary" id="analyze-btn" onclick="analyze()">分析</button>
      </div>

      <div id="error-msg" role="alert" aria-live="polite"></div>

      <div id="progress-wrap" aria-live="polite" aria-label="分析進度">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="progress-label" class="progress-label">分析中…</div>
      </div>
    </div><!-- /input-card -->

    <!-- right: results -->
    <div id="results" aria-live="polite">

      <!-- top genre -->
      <div class="result-card genre-card">
        <p class="card-label">預測風格</p>
        <div class="genre-banner">
          <span class="genre-icon" id="genre-icon" aria-hidden="true"></span>
          <span id="top-genre" class="genre-name"></span>
        </div>
      </div>

      <!-- charts -->
      <div class="charts-grid">
        <div class="result-card">
          <p class="card-label">投票分佈</p>
          <img class="chart-img" id="bar-chart" alt="各曲風投票分佈長條圖" />
        </div>
        <div class="result-card">
          <p class="card-label">Log-Mel 頻譜圖</p>
          <img class="chart-img" id="spectrogram" alt="音訊 Log-Mel 頻譜圖" />
        </div>
      </div>

      <!-- timeline + player -->
      <div class="result-card player-card" id="player-card">
        <div class="card-header">
          <p class="card-label">時間軸風格分段</p>
          <span class="song-title" id="song-title"></span>
        </div>
        <audio id="audio-el" preload="auto" style="display:none"></audio>
        <div class="timeline-player">
          <canvas id="timeline-canvas" aria-label="曲風時間軸"></canvas>
          <div id="timeline-labels" aria-hidden="true"></div>
          <div class="seek-track" id="seek-wrap" role="slider" aria-label="播放進度"
               aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="seek-fill" id="seek-fill"></div>
            <div class="seek-thumb" id="seek-thumb"></div>
          </div>
          <div class="player-controls">
            <button class="play-btn" id="play-btn" aria-label="播放/暫停">
              <svg id="icon-play"  viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>
              <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <span class="time-cur" id="time-cur">0:00</span>
            <span class="time-spacer"></span>
            <span class="time-dur" id="time-dur">0:00</span>
          </div>
        </div>
      </div>

    </div><!-- /results -->

    </div><!-- /main-layout -->
  </div>
</main>

<!-- ── Footer ── -->
<footer class="site-footer">
  <p>解碼音符 &nbsp;·&nbsp; Music Genre Predictor &nbsp;·&nbsp; Transformer Encoder</p>
</footer>

<script src="/static/main.js"></script>
</body>
</html>
